name: build-all

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]
        tfm: [net8.0, net11.0]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - run: dotnet publish -c Release -r ${{ matrix.rid }} -f ${{ matrix.tfm }} -o out/${{ matrix.rid }}-${{ matrix.tfm }}
    - uses: actions/upload-artifact@v4
      with:
        name: FractalKernel-${{ matrix.rid }}-${{ matrix.tfm }}
        path: out/
